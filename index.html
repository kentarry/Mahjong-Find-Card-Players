function ft(iso){const d=new Date(iso),h=String(d.getHours()).padStart(2,"0"),m=String(d.getMinutes()).padStart(2,"0"),t=new Date(),n=new Date(t);n.setDate(n.getDate()+1);const w=["日","一","二","三","四","五","六"][d.getDay()];if(d.toDateString()===t.toDateString())return"今天 "+h+":"+m;if(d.toDateString()===n.toDateString())return"明天 "+h+":"+m;return(d.getMonth()+1)+"/"+d.getDate()+"（"+w+"）"+h+":"+m}

function TP({selected,onChange}){const tg=t=>onChange(selected.includes(t)?selected.filter(x=>x!==t):[...selected,t]);const ts=on=>({padding:"4px 12px",borderRadius:18,fontSize:11,cursor:"pointer",border:"1px solid "+(on?"rgba(232,168,56,0.35)":Z.bd),background:on?Z.ac2:"transparent",color:on?Z.acc:Z.t3,fontFamily:"inherit",userSelect:"none"});return<div>{Object.entries(TAG_CATS).map(([k,c])=><div key={k} style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:Z.acc,textTransform:"uppercase",letterSpacing:1,marginBottom:6,paddingBottom:4,borderBottom:"1px solid "+Z.bd}}>{c.label}</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{c.items.map(t=><button key={t} type="button" style={ts(selected.includes(t))} onClick={()=>tg(t)}>{t}</button>)}</div></div>)}</div>}

function Dt({game:g,user,onClose,onReport,onBlock,onFlash,onCloseGame,onDeleteGame,isMine}){if(!g)return null;const s=gs(g),sc=SM[s],cd=ut(g.time),left=g.slots-g.filled;const dots=Array.from({length:g.slots},(_,i)=>i<g.filled);const tb=g.vType==="公開棋牌社"?{i:"🏢",bg:"rgba(74,222,128,0.1)",c:"#4ade80"}:g.vType==="私人住宅"?{i:"🏠",bg:"rgba(251,191,36,0.1)",c:"#facc15"}:{i:"📍",bg:"rgba(167,139,250,0.1)",c:"#a78bfa"};
return<Ov onClose={onClose}><button onClick={onClose} style={{position:"absolute",top:12,right:12,background:Z.c3,border:"none",color:Z.t2,width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1}}>✕</button>
<div style={{padding:"28px 20px 14px",display:"flex",gap:14}}><div style={{width:56,height:56,borderRadius:"50%",background:Z.c3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,border:"3px solid "+Z.b2,flexShrink:0}}>{g.host.avatar}</div><div style={{flex:1}}><div style={{fontSize:18,fontWeight:800}}>{g.host.name}</div><div style={{fontSize:12,color:Z.t3,marginTop:1}}>{g.host.tid}</div>{g.host.bio&&<div style={{fontSize:12,color:Z.t2,marginTop:4,lineHeight:1.6}}>{g.host.bio}</div>}<div style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:700,marginTop:6,background:tb.bg,color:tb.c}}>{tb.i} {g.vType}</div></div></div>
<div style={{margin:"0 20px",padding:"10px 14px",borderRadius:10,display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:700,background:sc.bg,color:sc.c,border:"1px solid "+sc.bd}}>{sc.e} {sc.l}{cd&&<span style={{marginLeft:"auto",fontSize:11,color:"#fbbf24"}}>⏰ {cd}</span>}</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,margin:"12px 20px 0",background:Z.bd,borderRadius:10,overflow:"hidden"}}><IC icon="📍" label="地點"><div>{g.city}{g.dist}</div><div style={{fontSize:11,color:Z.t3,marginTop:1}}>{g.venue}</div></IC><IC icon="🕐" label="開打時間"><div>{ft(g.time)}</div><div style={{fontSize:10,color:Z.t3,marginTop:1}}>{ff(g.time)}</div></IC><IC icon="💰" label="底/台" accent>{g.stakes}</IC><IC icon="👥" label="缺額"><div>缺 {left>0?left:0} 人</div><div style={{display:"flex",gap:5,marginTop:4}}>{dots.map((f,i)=><div key={i} style={{width:12,height:12,borderRadius:"50%",background:f?Z.acc:"transparent",border:f?"none":"2.5px solid "+Z.acc}}/>)}</div></IC></div>
{g.tags.length>0&&<div style={{padding:"14px 20px 0"}}><div style={{fontSize:10,fontWeight:700,color:Z.t3,textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>條件標籤</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{g.tags.map(t=><ST key={t} name={t}/>)}</div></div>}
<div style={{padding:"12px 20px 0"}}><SB/></div>
<div style={{padding:"16px 20px 8px"}}>{user&&(s==="open"||s==="soon")&&!isMine&&<button style={{...ba,...bL}} onClick={()=>{onFlash("跳轉至 "+g.host.name+" 的 Threads");window.open("https://www.threads.net/"+g.host.tid.replace("@",""),"_blank")}}>💬 我有興趣，前往 Threads 聯繫</button>}{!user&&(s==="open"||s==="soon")&&<div style={{textAlign:"center",color:Z.t3,fontSize:12,padding:8}}>請先登入才能聯繫主揪</div>}{isMine&&<div style={{display:"flex",gap:8}}>{(s==="open"||s==="soon")&&<button style={{...bo,flex:1}} onClick={()=>onCloseGame(g.id)}>標記已滿局</button>}<button style={{...bd,flex:1}} onClick={()=>onDeleteGame(g.id)}>刪除此局</button></div>}</div>
{user&&!isMine&&<div style={{display:"flex",gap:16,justifyContent:"center",padding:"8px 20px 20px"}}><button style={{fontSize:11,color:Z.t3,cursor:"pointer",background:"none",border:"none",fontFamily:"inherit"}} onClick={onReport}>🚩 檢舉</button><button style={{fontSize:11,color:Z.t3,cursor:"pointer",background:"none",border:"none",fontFamily:"inherit"}} onClick={onBlock}>🚫 封鎖</button></div>}
</Ov>}

function Cd({game:g,onClick}){const s=gs(g),sc=SM[s],left=g.slots-g.filled,cd=ut(g.time),dim=s==="expired"||s==="full";return<div onClick={dim?undefined:onClick} style={{...cr,padding:"14px 16px",cursor:dim?"default":"pointer",opacity:dim?0.3:1,filter:dim?"grayscale(0.5)":"none",marginBottom:6}}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:40,height:40,borderRadius:"50%",background:Z.c3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,border:"2px solid "+Z.b2,flexShrink:0}}>{g.host.avatar}</div><div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:6}}>{g.host.name}<span style={{fontSize:10,color:Z.t3,fontWeight:400}}>{g.host.tid}</span></div><div style={{display:"flex",flexWrap:"wrap",gap:"3px 12px",marginTop:3,fontSize:12,color:Z.t2}}><span>📍 {g.city}{g.dist} · {g.venue}</span><span>🕐 {ft(g.time)}</span><span style={{color:Z.acc,fontWeight:700}}>💰 {g.stakes}</span></div></div><div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}><Pl status={s}/>{(s==="open"||s==="soon")&&<div style={{fontSize:14,fontWeight:800,color:Z.acc}}>缺{left}人</div>}{cd&&<div style={{fontSize:10,color:"#facc15",fontWeight:600}}>⏰ {cd}</div>}{!dim&&<div style={{color:Z.t3,fontSize:18,marginTop:2}}>›</div>}</div></div></div>}

function Lb({games,user,onOpen}){const[sf,setSf]=useState(false);const[cy,sCy]=useState("");const[di,sDi]=useState("");const[df,sDf]=useState("");const[dt2,sDt]=useState("");const[tf,sTf]=useState("");const[tt2,sTt]=useState("");const[mn,sMn]=useState("");const[mx,sMx]=useState("");const[vt,sVt]=useState("");const[tg,sTg]=useState([]);const[he,sHe]=useState(true);
const tt3=t=>sTg(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);const cl=()=>{sCy("");sDi("");sDf("");sDt("");sTf("");sTt("");sMn("");sMx("");sVt("");sTg([])};const fN=[cy,di,df,dt2,tf,tt2,mn,mx,vt].filter(Boolean).length+tg.length;const cS=on=>({padding:"3px 9px",borderRadius:14,fontSize:10,cursor:"pointer",border:"1px solid "+(on?"rgba(232,168,56,0.3)":Z.bd),background:on?Z.ac2:"transparent",color:on?Z.acc:Z.t3,fontFamily:"inherit"});

<div onClick={()=>setSf(!sf)} style={{display:"flex",alignItems:"center",gap:8,margin:"14px 0 10px",cursor:"pointer",userSelect:"none"}}><span style={{fontSize:12,fontWeight:600,color:Z.t2}}>🔍 篩選條件</span>{fN>0&&<span style={{fontSize:10,background:Z.acc,color:"#0a0b10",padding:"1px 7px",borderRadius:10,fontWeight:700}}>{fN}</span>}<span style={{fontSize:10,color:Z.t3,transform:sf?"rotate(180deg)":"none"}}>▼</span>{fN>0&&<button onClick={e=>{e.stopPropagation();cl()}} style={{fontSize:10,color:Z.t3,cursor:"pointer",background:"none",border:"none",fontFamily:"inherit",textDecoration:"underline",marginLeft:"auto"}}>清除全部</button>}</div>
